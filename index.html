<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🔮 술타로</title>
<style>
  :root {
    --bg: #0d0d1a;
    --card-bg: #1a1a2e;
    --gold: #f0c040;
    --gold2: #c8960c;
    --purple: #7c3aed;
    --pink: #e879a0;
    --text: #e8e0f0;
    --muted: #8880a0;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 20px;
    background-image: radial-gradient(ellipse at 50% 0%, #1e0a3c 0%, #0d0d1a 70%);
  }

  /* ── 별 배경 ── */
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .star { position: absolute; border-radius: 50%; background: white; animation: twinkle 3s infinite; }
  @keyframes twinkle { 0%,100%{opacity:.2} 50%{opacity:.8} }

  /* ── 공통 ── */
  .screen { position: relative; z-index: 1; width: 100%; max-width: 440px; text-align: center; }
  .title { font-size: 2.4rem; color: var(--gold); margin-bottom: 6px; letter-spacing: 4px; text-shadow: 0 0 20px #f0c04088; }
  .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 32px; }

  /* ── 버튼 ── */
  .btn {
    width: 100%; padding: 16px; border: none; border-radius: var(--radius);
    font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: all .15s;
    letter-spacing: 1px;
  }
  .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: #1a0a00; }
  .btn-gold:active { transform: scale(.97); }
  .btn-outline {
    background: transparent; border: 1.5px solid var(--purple); color: var(--text);
    margin-top: 10px;
  }
  .btn-outline:active { background: #3a0a6e44; }

  /* ── 입력 ── */
  .input-group { margin-bottom: 12px; text-align: left; }
  .input-group label { display: block; font-size: .85rem; color: var(--muted); margin-bottom: 4px; }
  .input-group input {
    width: 100%; padding: 14px 16px;
    background: #16162a; border: 1.5px solid #3a3a5a; border-radius: 10px;
    color: var(--text); font-size: 1rem;
    outline: none; transition: border-color .2s;
  }
  .input-group input:focus { border-color: var(--purple); }
  .input-group input::placeholder { color: #505070; }
  .add-player { color: var(--purple); background: none; border: none; cursor: pointer; font-size: .9rem; margin: 4px 0 16px; }

  /* ── 카드 ── */
  .card-arena { perspective: 1200px; margin: 24px auto; width: 200px; height: 320px; }
  .card-inner {
    width: 100%; height: 100%; position: relative;
    transform-style: preserve-3d; transition: transform .7s cubic-bezier(.4,0,.2,1);
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute; inset: 0; border-radius: 20px;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 20px; overflow: hidden;
  }
  .card-back {
    background: linear-gradient(145deg, #1e0a3c, #2d1060);
    border: 2px solid var(--gold);
    cursor: pointer;
    user-select: none;
  }
  .card-back::before {
    content: '';
    position: absolute; inset: 8px;
    border: 1px solid #f0c04055;
    border-radius: 14px;
  }
  .card-back-symbol { font-size: 5rem; opacity: .7; }
  .card-back-text { color: var(--gold); font-size: .85rem; margin-top: 12px; letter-spacing: 3px; opacity: .8; }
  .card-front {
    background: linear-gradient(145deg, #1a0535, #0a1a3a);
    border: 2px solid var(--gold);
    transform: rotateY(180deg);
  }
  .card-emoji { font-size: 3.5rem; margin-bottom: 10px; }
  .card-name { font-size: 1rem; font-weight: 700; color: var(--gold); text-align: center; line-height: 1.3; }
  .card-num { font-size: .75rem; color: var(--muted); margin-top: 4px; }

  /* ── 결과창 ── */
  .result-box {
    background: #16162a; border-radius: var(--radius); padding: 20px;
    border: 1px solid #3a3a6a; margin: 0 0 16px; text-align: left;
  }
  .result-meaning { font-size: .95rem; line-height: 1.6; color: var(--text); margin-bottom: 14px; }
  .mission-badge {
    display: inline-block; padding: 8px 16px;
    background: linear-gradient(135deg, #7c3aed, #c026d3);
    border-radius: 30px; font-size: .9rem; font-weight: 700; color: white;
    width: 100%; text-align: center;
  }

  /* ── 플레이어 순서 ── */
  .player-bar {
    display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center;
  }
  .player-chip {
    padding: 6px 14px; border-radius: 20px; font-size: .8rem;
    background: #2a2a4a; color: var(--muted);
    transition: all .2s;
  }
  .player-chip.active {
    background: linear-gradient(135deg, var(--purple), var(--pink));
    color: white; font-weight: 700;
    box-shadow: 0 0 12px #7c3aed66;
  }
  .player-chip.done { text-decoration: line-through; opacity: .4; }

  /* ── 라운드 헤더 ── */
  .round-header { margin-bottom: 20px; }
  .round-header .whose-turn { font-size: 1.4rem; font-weight: 700; color: var(--gold); }
  .round-header .sub { font-size: .85rem; color: var(--muted); margin-top: 4px; }

  /* ── 도움말 ── */
  .hint { font-size: .8rem; color: var(--muted); margin-top: 8px; }

  /* ── 최종 결과 ── */
  .final-list { text-align: left; margin: 12px 0 24px; }
  .final-item {
    padding: 14px; border-radius: 12px; background: #16162a;
    margin-bottom: 10px; border: 1px solid #2a2a4a;
  }
  .final-item .name { font-weight: 700; color: var(--gold); font-size: .9rem; }
  .final-item .card-title { font-size: .95rem; margin-top: 4px; }
  .final-item .final-mission { font-size: .8rem; color: #c084fc; margin-top: 4px; }

  .hidden { display: none !important; }

  /* 반짝 애니 */
  @keyframes glow-in { 0%{opacity:0;transform:scale(.8)} 100%{opacity:1;transform:scale(1)} }
  .glow-in { animation: glow-in .4s ease forwards; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<!-- ── 화면 1: 설정 ── -->
<div class="screen" id="screen-setup">
  <div class="title">🔮 술타로</div>
  <div class="subtitle">타로 카드로 즐기는 술게임</div>

  <div id="player-inputs">
    <div class="input-group">
      <label>플레이어 1</label>
      <input type="text" placeholder="이름 입력" maxlength="8">
    </div>
    <div class="input-group">
      <label>플레이어 2</label>
      <input type="text" placeholder="이름 입력" maxlength="8">
    </div>
  </div>
  <button class="add-player" onclick="addPlayer()">+ 플레이어 추가 (최대 8명)</button>

  <button class="btn btn-gold" onclick="startGame()">✨ 게임 시작</button>
</div>

<!-- ── 화면 2: 게임 ── -->
<div class="screen hidden" id="screen-game">
  <div class="title" style="font-size:1.6rem; margin-bottom:4px;">🔮 술타로</div>

  <div class="player-bar" id="player-bar"></div>

  <div class="round-header" id="round-header"></div>

  <!-- 카드 -->
  <div id="card-container">
    <div class="card-arena" id="card-arena">
      <div class="card-inner" id="card-inner">
        <div class="card-face card-back" onclick="flipCard()">
          <div class="card-back-symbol">✦</div>
          <div class="card-back-text">터치하여 뽑기</div>
        </div>
        <div class="card-face card-front">
          <div class="card-emoji" id="card-emoji"></div>
          <div class="card-name" id="card-name"></div>
          <div class="card-num" id="card-num"></div>
        </div>
      </div>
    </div>
    <div class="hint" id="flip-hint">카드를 터치하세요</div>
  </div>

  <!-- 결과 (뒤집은 후) -->
  <div class="hidden" id="result-area">
    <div class="result-box glow-in">
      <div class="result-meaning" id="result-meaning"></div>
      <div class="mission-badge" id="result-mission"></div>
    </div>
    <button class="btn btn-gold" onclick="nextPlayer()" id="btn-next">다음 사람 →</button>
  </div>
</div>

<!-- ── 화면 3: 최종 ── -->
<div class="screen hidden" id="screen-final">
  <div class="title" style="font-size:1.6rem; margin-bottom:4px;">🎴 결과 요약</div>
  <div class="subtitle" id="final-subtitle"></div>
  <div class="final-list" id="final-list"></div>
  <button class="btn btn-gold" onclick="restartGame()">🔄 다시 하기</button>
  <button class="btn btn-outline" onclick="goSetup()">👥 멤버 바꾸기</button>
</div>

let players = [];
let order = [];
let currentIdx = 0;
let results = [];
let usedCards = new Set();
let drawnCard = null;
let flipped = false;

// ── 별 생성 ──
function createStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%; top:${Math.random()*100}%;
      animation-delay:${Math.random()*3}s;
      animation-duration:${2+Math.random()*3}s;
    `;
    c.appendChild(s);
  }
}

// ── 플레이어 추가 ──
function addPlayer() {
  const wrap = document.getElementById('player-inputs');
  const count = wrap.querySelectorAll('.input-group').length;
  if (count >= 8) return;
  const div = document.createElement('div');
  div.className = 'input-group';
  div.innerHTML = `<label>플레이어 ${count+1}</label><input type="text" placeholder="이름 입력" maxlength="8">`;
  wrap.appendChild(div);
}

// ── 게임 시작 ──
function startGame() {
  const inputs = document.querySelectorAll('#player-inputs input');
  players = [];
  inputs.forEach((inp, i) => {
    const name = inp.value.trim() || `플레이어${i+1}`;
    players.push(name);
  });
  if (players.length < 1) { alert('최소 1명 필요해요!'); return; }

  order = [...players];
  currentIdx = 0;
  results = [];
  usedCards = new Set();

  showScreen('game');
  renderPlayerBar();
  setupRound();
}

function showScreen(name) {
  ['setup','game','final'].forEach(s => {
    document.getElementById(`screen-${s}`).classList.add('hidden');
  });
  document.getElementById(`screen-${name}`).classList.remove('hidden');
}

// ── 플레이어 바 ──
function renderPlayerBar() {
  const bar = document.getElementById('player-bar');
  bar.innerHTML = order.map((p, i) => {
    let cls = 'player-chip';
    if (i === currentIdx) cls += ' active';
    else if (i < currentIdx) cls += ' done';
    return `<span class="${cls}">${i < currentIdx ? '✓ ' : ''}${p}</span>`;
  }).join('');
}

// ── 라운드 설정 ──
function setupRound() {
  flipped = false;
  drawnCard = null;

  // 카드 초기화
  const inner = document.getElementById('card-inner');
  inner.classList.remove('flipped');
  document.getElementById('card-emoji').textContent = '';
  document.getElementById('card-name').textContent = '';
  document.getElementById('card-num').textContent = '';

  document.getElementById('result-area').classList.add('hidden');
  document.getElementById('card-container').classList.remove('hidden');
  document.getElementById('flip-hint').textContent = '카드를 터치하세요';

  const p = order[currentIdx];
  const rh = document.getElementById('round-header');
  rh.innerHTML = `
    <div class="whose-turn">✨ ${p}의 차례</div>
    <div class="sub">${currentIdx + 1} / ${order.length} 번째</div>
  `;
}

// ── 카드 뒤집기 ──
function flipCard() {
  if (flipped) return;
  flipped = true;

  // 랜덤 카드 뽑기
  let available = TAROT.filter((_, i) => !usedCards.has(i));
  if (available.length === 0) { usedCards.clear(); available = [...TAROT]; }
  const idx = Math.floor(Math.random() * available.length);
  drawnCard = available[idx];
  usedCards.add(TAROT.indexOf(drawnCard));

  // 카드 앞면 채우기
  document.getElementById('card-emoji').textContent = drawnCard.emoji;
  document.getElementById('card-name').textContent = drawnCard.name;
  document.getElementById('card-num').textContent = `${drawnCard.num} · ${drawnCard.en}`;

  // 플립
  document.getElementById('card-inner').classList.add('flipped');
  document.getElementById('flip-hint').textContent = '';

  // 0.7초 후 결과 표시
  setTimeout(showResult, 750);
}

// ── 결과 표시 ──
function showResult() {
  document.getElementById('card-container').classList.add('hidden');

  const mission = drawnCard.missions[Math.floor(Math.random() * drawnCard.missions.length)];
  document.getElementById('result-meaning').innerHTML =
    `<strong style="color:var(--gold)">${drawnCard.emoji} ${drawnCard.name} (${drawnCard.en})</strong><br><br>${drawnCard.meaning}`;
  document.getElementById('result-mission').textContent = '🍺 ' + mission.replace(/^[🍻🍺🎤✨🌙💜🤫🕯️🧘🎡🍀🎲⚖️👨‍⚖️🙃😅💪🦁🥃😱🌊⭐🌟✨🌕🦊☀️🌞🎉📯🔔🍵⚡💥🏚️🌍🏆🎊]/u,'').trim();

  // 결과 저장
  results.push({ player: order[currentIdx], card: drawnCard, mission });

  const isLast = currentIdx >= order.length - 1;
  const btn = document.getElementById('btn-next');
  btn.textContent = isLast ? '🎴 결과 보기' : '다음 사람 →';

  document.getElementById('result-area').classList.remove('hidden');
  document.getElementById('result-area').classList.add('glow-in');
  setTimeout(() => document.getElementById('result-area').classList.remove('glow-in'), 400);
}

// ── 다음 플레이어 ──
function nextPlayer() {
  if (currentIdx >= order.length - 1) {
    showFinal();
    return;
  }
  currentIdx++;
  renderPlayerBar();

  // 카드 다시 뒤집기
  const inner = document.getElementById('card-inner');
  inner.classList.add('flipped');
  document.getElementById('result-area').classList.add('hidden');
  document.getElementById('card-container').classList.remove('hidden');

  setTimeout(() => {
    inner.classList.remove('flipped');
    setTimeout(setupRound, 50);
  }, 100);
}

// ── 최종 결과 ──
function showFinal() {
  showScreen('final');
  document.getElementById('final-subtitle').textContent =
    `${order.length}명 모두 카드를 뽑았어요!`;

  const list = document.getElementById('final-list');
  list.innerHTML = results.map(r => `
    <div class="final-item">
      <div class="name">${r.player}</div>
      <div class="card-title">${r.card.emoji} ${r.card.name} (${r.card.en})</div>
      <div class="final-mission">${r.mission}</div>
    </div>
  `).join('');
}

function restartGame() {
  currentIdx = 0;
  results = [];
  usedCards = new Set();
  showScreen('game');
  renderPlayerBar();
  setupRound();
}

function goSetup() {
  showScreen('setup');
}

// ── 초기화 ──
createStars();
</script>
</body>
</html>
