<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🔮 타로</title>
<style>
:root {
  --bg: #0b0b18;
  --surface: #13132a;
  --gold: #e8b84b;
  --gold2: #a07820;
  --purple: #6d28d9;
  --text: #e2daf2;
  --muted: #7870a0;
  --r: 14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100vh;background:var(--bg);color:var(--text);
  font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  background-image:radial-gradient(ellipse at 50% -10%,#1c0840 0%,#0b0b18 65%)}

/* 별 */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;animation:tw 3s infinite}
@keyframes tw{0%,100%{opacity:.15}50%{opacity:.7}}

/* 공통 레이아웃 */
.page{position:relative;z-index:1;max-width:460px;margin:0 auto;padding:24px 18px 40px}
.hidden{display:none!important}
h1{font-size:1.8rem;color:var(--gold);text-align:center;letter-spacing:6px;
   text-shadow:0 0 24px #e8b84b55;margin-bottom:6px}
.sub{text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:28px}

/* 버튼 */
.btn{display:block;width:100%;padding:15px;border:none;border-radius:var(--r);
  font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all .15s}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a0e00}
.btn-gold:active{transform:scale(.97)}
.btn-line{background:transparent;border:1.5px solid var(--purple);color:var(--text);margin-top:10px}
.btn-sm{padding:11px;font-size:.9rem}

/* 선택 카드들 */
.spread-grid{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:24px 0}
.spread-card{flex:1;min-width:120px;max-width:180px;padding:20px 10px;
  background:var(--surface);border:1.5px solid #2e2e5a;border-radius:var(--r);
  text-align:center;cursor:pointer;transition:all .2s}
.spread-card:active{transform:scale(.96)}
.spread-card .sc-icon{font-size:2rem;margin-bottom:8px}
.spread-card .sc-title{font-weight:700;color:var(--gold);font-size:.95rem}
.spread-card .sc-desc{font-size:.75rem;color:var(--muted);margin-top:4px;line-height:1.4}

/* 섞기 화면 */
.deck-wrap{text-align:center;margin:20px 0}
.deck{width:120px;height:190px;margin:0 auto;position:relative;cursor:pointer}
.deck-card{position:absolute;inset:0;border-radius:14px;
  background:linear-gradient(145deg,#1c0840,#0a1040);
  border:2px solid var(--gold2);box-shadow:2px 2px 0 #0005}
.deck-card:nth-child(1){transform:translate(-3px,-3px)}
.deck-card:nth-child(2){transform:translate(-1px,-1px)}
.deck-card:nth-child(3){transform:translate(0,0);
  display:flex;align-items:center;justify-content:center;flex-direction:column}
.deck-symbol{font-size:3.5rem;opacity:.6}
.deck-tap{font-size:.75rem;color:var(--gold);margin-top:8px;letter-spacing:2px;opacity:.7}

/* 카드 부채꼴 선택 */
.fan-wrap{position:relative;height:260px;margin:0 auto;display:flex;
  align-items:flex-end;justify-content:center}
.fan-card{position:absolute;width:60px;height:100px;border-radius:8px;
  background:linear-gradient(145deg,#1c0840,#0a1040);border:1.5px solid var(--gold2);
  cursor:pointer;transform-origin:bottom center;bottom:0;transition:transform .2s,filter .2s;
  display:flex;align-items:center;justify-content:center;font-size:1.4rem;opacity:.8}
.fan-card:hover,.fan-card.sel{filter:brightness(1.5);z-index:10;transform-origin:bottom center}
.fan-card.sel{border-color:var(--gold);box-shadow:0 0 16px #e8b84b66}

/* 뽑힌 카드 */
.drawn-wrap{display:flex;flex-direction:column;align-items:center;gap:18px;margin:16px 0}
.drawn-card-outer{perspective:1000px;width:200px;height:320px}
.drawn-card-inner{width:100%;height:100%;position:relative;
  transform-style:preserve-3d;transition:transform .8s cubic-bezier(.4,0,.2,1)}
.drawn-card-inner.flip{transform:rotateY(180deg)}
.face{position:absolute;inset:0;border-radius:18px;backface-visibility:hidden;
  -webkit-backface-visibility:hidden;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:18px}
.face-back{background:linear-gradient(145deg,#1c0840,#0a1040);border:2px solid var(--gold)}
.face-back::before{content:'';position:absolute;inset:8px;border:1px solid #e8b84b44;border-radius:12px}
.face-front{background:linear-gradient(145deg,#130530,#0a1030);border:2px solid var(--gold);transform:rotateY(180deg)}
.face-front.reversed{transform:rotateY(180deg) rotate(180deg)}
.card-emoji-big{font-size:4rem;margin-bottom:10px}
.card-title{font-size:1.1rem;font-weight:700;color:var(--gold);text-align:center}
.card-en{font-size:.75rem;color:var(--muted);margin-top:3px}
.reversed-badge{font-size:.7rem;background:#7c1d1d;color:#fca5a5;
  padding:3px 10px;border-radius:20px;margin-top:6px}

/* 해석 박스 */
.interp{background:var(--surface);border-radius:var(--r);padding:18px;
  border:1px solid #2e2e5a;margin:4px 0 16px}
.interp-kw{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.kw-chip{padding:4px 12px;border-radius:20px;font-size:.78rem;
  background:#1e1e4a;border:1px solid #3a3a6a;color:var(--gold)}
.interp-label{font-size:.75rem;color:var(--purple);font-weight:700;
  letter-spacing:2px;margin-bottom:6px;margin-top:10px}
.interp-text{font-size:.92rem;line-height:1.7;color:var(--text)}
.interp-text.rev-text{color:#fca5a5}

/* 3장 스프레드 결과 */
.three-positions{display:flex;gap:8px;margin:16px 0}
.pos-slot{flex:1;text-align:center}
.pos-label{font-size:.75rem;color:var(--muted);margin-bottom:8px}
.pos-mini{width:70px;height:110px;margin:0 auto;border-radius:10px;
  background:linear-gradient(145deg,#1c0840,#0a1040);border:1.5px solid var(--gold2);
  display:flex;align-items:center;justify-content:center;font-size:1.8rem;
  cursor:pointer;transition:all .2s;position:relative}
.pos-mini.sel{border-color:var(--gold);box-shadow:0 0 12px #e8b84b66;transform:scale(1.05)}
.pos-mini.rev-card::after{content:'↺';position:absolute;top:4px;right:4px;
  font-size:.65rem;color:#fca5a5;background:#7c1d1d;border-radius:4px;padding:1px 3px}

/* 탭 (3장 상세) */
.tab-bar{display:flex;border-bottom:1px solid #2e2e5a;margin-bottom:16px}
.tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:.85rem;color:var(--muted);border-bottom:2px solid transparent}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}

/* 질문 입력 */
.q-input{width:100%;padding:14px;background:#16162a;border:1.5px solid #3a3a5a;
  border-radius:10px;color:var(--text);font-size:.95rem;outline:none;resize:none;
  margin-bottom:14px;font-family:inherit}
.q-input:focus{border-color:var(--purple)}
.q-input::placeholder{color:#404060}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .4s ease forwards}
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<!-- ① 스프레드 선택 -->
<div class="page" id="p-start">
  <h1>🔮 타로</h1>
  <p class="sub">마음 속 질문을 떠올리며 카드를 선택하세요</p>

  <textarea class="q-input" id="q-input" rows="2" placeholder="오늘의 질문을 입력해보세요 (선택)"></textarea>

  <div class="spread-grid">
    <div class="spread-card" onclick="startDraw(1)">
      <div class="sc-icon">🃏</div>
      <div class="sc-title">원 카드</div>
      <div class="sc-desc">오늘의 핵심 메시지<br>한 장으로 명확하게</div>
    </div>
    <div class="spread-card" onclick="startDraw(3)">
      <div class="sc-icon">🌙⭐🌟</div>
      <div class="sc-title">쓰리 카드</div>
      <div class="sc-desc">과거 · 현재 · 미래<br>흐름을 한눈에</div>
    </div>
  </div>
</div>

<!-- ② 카드 선택 -->
<div class="page hidden" id="p-pick">
  <h1>🔮 타로</h1>
  <p class="sub" id="pick-sub"></p>
  <div class="deck-wrap" id="fan-wrap"></div>
  <p style="text-align:center;color:var(--muted);font-size:.82rem;margin-top:8px" id="pick-hint"></p>
  <div id="pick-btns" style="margin-top:20px"></div>
</div>

<!-- ③ 원카드 결과 -->
<div class="page hidden" id="p-one">
  <h1>🔮 타로</h1>
  <div class="drawn-wrap" id="one-drawn"></div>
  <div id="one-interp"></div>
  <button class="btn btn-gold" onclick="restart()">🔄 다시 뽑기</button>
  <button class="btn btn-line" onclick="goStart()" style="margin-top:10px">← 처음으로</button>
</div>

<!-- ④ 쓰리카드 결과 -->
<div class="page hidden" id="p-three">
  <h1>🔮 타로</h1>
  <div class="three-positions" id="three-mini"></div>
  <div class="tab-bar" id="three-tabs"></div>
  <div id="three-detail"></div>
  <button class="btn btn-gold" onclick="restart()">🔄 다시 뽑기</button>
  <button class="btn btn-line" onclick="goStart()" style="margin-top:10px">← 처음으로</button>
</div>

   rev:"변화를 두려워해 무너져야 할 것을 억지로 붙잡고 있어요. 혼란을 내면적으로 소화하며 회복 중인 시기예요."},

   rev:"희망을 잃거나 자신을 의심하고 있어요. 작은 것부터 다시 믿음을 쌓아가세요."},
  {n:"XVIII",name:"달",en:"The Moon",e:"🌕",
   kw:["불안","착각","무의식","탐색"],

   rev:"혼란이 서서히 걷히고 진실이 보이기 시작해요. 억압했던 감정이나 무의식이 수면 위로 떠오르는 시기예요."},
  {n:"XIX",name:"태양",en:"The Sun",e:"☀️",
   kw:["기쁨","성공","활력","밝음"],
   up:"가장 밝고 긍정적인 에너지예요! 자신감과 활력이 넘치고 원하는 일이 잘 풀릴 시기예요. 지금의 기쁨을 충분히 느끼고 나눠보세요.",

   kw:["각성","부활","소명","결단"],
   up:"오랫동안 미뤄온 결단을 내릴 때가 됐어요. 과거를 용서하고 자신을 새롭게 바라보며 더 높은 소명을 향해 발걸음을 내딛으세요.",
   rev:"자기비판이 지나치거나 과거에 집착하고 있어요. 스스로를 용서하는 것이 진짜 새 출발의 시작이에요."},
  {n:"XXI",name:"세계",en:"The World",e:"🌍",
   kw:["완성","통합","성취","새 시작"],
   up:"하나의 큰 사이클이 완성되는 순간이에요. 노력이 빛을 발하고 원하는 것이 이루어지는 시기예요. 이 성취를 기반으로 다음 여정을 준비하세요.",
   rev:"완성 직전에 막혀 있거나 마무리가 늦어지고 있어요. 조금만 더, 완성을 향해 한 발자국씩 나아가세요."},
];

const POS_LABELS = ["과거","현재","미래"];
let spreadN=1, drawnCards=[], question="", activeTab=0;

// 별
(()=>{const c=document.getElementById('stars');for(let i=0;i<55;i++){const s=document.createElement('div');s.className='star';const z=Math.random()*2+.5;s.style.cssText=`width:${z}px;height:${z}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*4}s;animation-duration:${2+Math.random()*3}s;`;c.appendChild(s);}})();

function show(id){['p-start','p-pick','p-one','p-three'].forEach(x=>document.getElementById(x).classList.add('hidden'));document.getElementById(id).classList.remove('hidden')}

function goStart(){show('p-start')}
function restart(){startDraw(spreadN)}

// ── 카드 뽑기 단계 시작 ──
function startDraw(n){
  spreadN=n; drawnCards=[];
  question=document.getElementById('q-input').value.trim();
  show('p-pick');
  renderPick();
}

function renderPick(){
  const picked = drawnCards.length;
  const label = spreadN===1 ? "마음에 드는 카드를 한 장 선택하세요" : `${POS_LABELS[picked]} 카드를 선택하세요 (${picked+1}/${spreadN})`;
  document.getElementById('pick-sub').textContent = question ? `"${question}"` : label;
  document.getElementById('pick-hint').textContent = label;

  const wrap = document.getElementById('fan-wrap');
  const btns = document.getElementById('pick-btns');
  btns.innerHTML = '';

  // 부채꼴 카드 렌더
  const total = 13;
  const angleRange = 80;
  wrap.innerHTML = `<div class="fan-wrap" id="fan-inner" style="height:260px;width:100%"></div>`;
  const inner = document.getElementById('fan-inner');
  inner.style.cssText='position:relative;height:260px;display:flex;align-items:flex-end;justify-content:center';

  const avail = T.filter((_,i)=>!drawnCards.find(d=>d.idx===i)).map((_,i)=>i)
    .filter(i=>!drawnCards.find(d=>d.idx===i));
  // 셔플된 풀에서 display용 배열 (중복없이 total장)
  const pool = [...Array(T.length).keys()].filter(i=>!drawnCards.find(d=>d.idx===i));
  const display = pool.sort(()=>Math.random()-.5).slice(0,Math.min(total,pool.length));

  display.forEach((cardIdx,i)=>{
    const angle = -angleRange/2 + (angleRange/(display.length-1||1))*i;
    const el = document.createElement('div');
    el.className='fan-card';
    el.textContent='✦';
    el.dataset.cidx = cardIdx;
    el.style.cssText=`transform:rotate(${angle}deg) translateY(-20px);left:calc(50% - 30px + ${i*0}px);position:absolute;bottom:0`;
    el.onclick=()=>selectCard(cardIdx);
    inner.appendChild(el);
  });
}

function selectCard(cardIdx){
  const isRev = Math.random() < .35; // 35% 역방향
  drawnCards.push({idx:cardIdx, reversed:isRev});

  if(drawnCards.length < spreadN){
    renderPick();
  } else {
    showResult();
  }
}

function showResult(){
  if(spreadN===1) showOne();
  else showThree();
}

// ── 원카드 결과 ──
function showOne(){
  show('p-one');
  const {idx,reversed} = drawnCards[0];
  const card = T[idx];
  document.getElementById('one-drawn').innerHTML = buildCardHTML(card, reversed, true);
  setTimeout(()=>document.querySelector('.drawn-card-inner').classList.add('flip'),200);
  setTimeout(()=>{
    document.getElementById('one-interp').innerHTML = buildInterp(card, reversed);
    document.getElementById('one-interp').classList.add('fade-up');
  }, 1000);
}

// ── 쓰리카드 결과 ──
function showThree(){
  show('p-three');
  activeTab = 0;

  const mini = document.getElementById('three-mini');
  mini.innerHTML = drawnCards.map(({idx,reversed},i)=>{
    const c=T[idx];
    return `<div class="pos-slot">
      <div class="pos-label">${POS_LABELS[i]}</div>
      <div class="pos-mini ${reversed?'rev-card':''} ${i===activeTab?'sel':''}" onclick="switchTab(${i})" id="pmini-${i}">${c.e}</div>
      <div style="font-size:.75rem;color:var(--gold);margin-top:5px">${c.name}</div>
    </div>`;
  }).join('');

  renderTabs();
  renderThreeDetail();
}

function switchTab(i){
  activeTab=i;
  document.querySelectorAll('.pos-mini').forEach((el,j)=>el.classList.toggle('sel',j===i));
  document.querySelectorAll('.tab').forEach((el,j)=>el.classList.toggle('on',j===i));
  renderThreeDetail();
}

function renderTabs(){
  document.getElementById('three-tabs').innerHTML = drawnCards.map(({idx},i)=>{
    const c=T[idx];
    return `<div class="tab ${i===activeTab?'on':''}" onclick="switchTab(${i})">${POS_LABELS[i]}<br><small>${c.name}</small></div>`;
  }).join('');
}

function renderThreeDetail(){
  const {idx,reversed}=drawnCards[activeTab];
  const card=T[idx];
  document.getElementById('three-detail').innerHTML =
    `<div class="drawn-wrap">${buildCardHTML(card,reversed,false)}</div>` +
    buildInterp(card,reversed);
}

// ── 공통 카드 HTML ──
function buildCardHTML(card, reversed, withAnim){
  return `<div class="drawn-card-outer">
    <div class="drawn-card-inner${withAnim?'':' flip'}" style="${withAnim?'':''}">
      <div class="face face-back"><span style="font-size:4rem;opacity:.5">✦</span></div>
      <div class="face face-front${reversed?' reversed':''}">
        <div class="card-emoji-big">${card.e}</div>
        <div class="card-title">${card.name}</div>
        <div class="card-en">${card.n} · ${card.en}</div>
        ${reversed?'<div class="reversed-badge">↺ 역방향</div>':''}
      </div>
    </div>
  </div>`;
}

// ── 해석 HTML ──
function buildInterp(card, reversed){
  const txt = reversed ? card.rev : card.up;
  return `<div class="interp fade-up">
    <div class="interp-kw">${card.kw.map(k=>`<span class="kw-chip">${k}</span>`).join('')}</div>
    <div class="interp-label">${reversed?'↺ 역방향 해석':'▲ 정방향 해석'}</div>
    <div class="interp-text ${reversed?'rev-text':''}">${txt}</div>
  </div>`;
}
</script>
</body>
</html>
